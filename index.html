<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hari's Smart Home Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --primary: #007bff; --neon: #00f2ff; }
        
        body { 
            font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh;
            background: #000; display: flex; flex-direction: column; overflow-x: hidden;
        }

        #hyperspeed-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #dashboardContent { position: relative; z-index: 10; display: none; flex-direction: column; width: 100%; }

        /* --- ReactBits: Glass & Shiny Borders --- */
        .card { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px);
            border-radius: 28px; padding: 30px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }

        /* Animated Border Effect for Active Cards */
        .card.active-neon {
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .card.active-neon::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--neon), transparent 30%);
            animation: rotate 4s linear infinite; z-index: -1;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* --- UI Elements --- */
        .top-nav { 
            background: rgba(0, 0, 0, 0.6); padding: 15px 25px; display: flex; 
            justify-content: space-between; align-items: center; color: white;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .main-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; padding: 25px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box;
        }
        
        .gauge { 
            width: 140px; height: 140px; border-radius: 50%; margin: 20px auto;
            display: flex; align-items: center; justify-content: center;
            background: conic-gradient(var(--primary) 0deg, rgba(255,255,255,0.1) 0deg); position: relative;
        }
        .gauge::after { content: ""; position: absolute; width: 115px; height: 115px; background: #000; border-radius: 50%; }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-device { 
            border: 1px solid rgba(255,255,255,0.1); padding: 25px 10px; border-radius: 20px; 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; 
            font-weight: 700; background: rgba(255,255,255,0.03); color: #888; transition: 0.3s;
        }
        .btn-on { background: var(--primary); color: white; box-shadow: 0 0 15px var(--primary); border: none; }
        
        #motStatus { padding: 15px; border-radius: 15px; font-weight: 800; margin-top: 20px; transition: 0.5s; letter-spacing: 2px; }

        #allOff { background: #ff4d4f; color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 90%; max-width: 400px; cursor: pointer; margin: 20px auto; display: block; }

        /* Login Screen */
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #111; padding: 40px; border-radius: 24px; border: 1px solid #333; text-align: center; color: white; width: 350px; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; }
    </style>
</head>
<body>

    <canvas id="hyperspeed-canvas"></canvas>

    <div id="loginOverlay">
        <div class="login-card">
            <h2>Hari's Home Pro</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="loginBtn" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">ACCESS SYSTEM</button>
            <p id="loginError" style="color:red; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <div id="dashboardContent">
        <nav class="top-nav">
            <div><h2 style="margin:0;"><i class="fas fa-microchip"></i> HARI_OS</h2></div>
            <div style="text-align:right;">
                <p id="liveTime" style="margin:0; font-weight:bold; color:var(--neon);"></p>
                <p id="liveDate" style="margin:0; font-size:0.8rem; opacity:0.5;"></p>
            </div>
        </nav>

        <div class="main-grid">
            <div class="card" id="tempCard">
                <small style="opacity:0.5;">THERMAL SENSORS</small>
                <div class="gauge" id="tempGauge"><span style="position:relative; z-index:10; font-size:1.8rem; font-weight:900;"><span id="tempVal">--</span>°C</span></div>
            </div>

            <div class="card" id="motCard">
                <small style="opacity:0.5;">SECURITY MESH</small>
                <h3 style="margin:25px 0; font-size: 2.2rem;"><i class="fas fa-wind" style="color:var(--neon)"></i> <span id="humVal">--</span>%</h3>
                <div id="motStatus">IDLE</div>
            </div>

            <div class="card">
                <small style="opacity:0.5;">MODULE CONTROLS</small>
                <div class="control-grid">
                    <button class="btn-device" id="btn1"><i class="fas fa-lightbulb"></i>Light</button>
                    <button class="btn-device" id="btn2"><i class="fas fa-fan"></i>Fan</button>
                    <button class="btn-device" id="btn3"><i class="fas fa-snowflake"></i>AC</button>
                    <button class="btn-device" id="btn4"><i class="fas fa-plug"></i>Fridge</button>
                </div>
            </div>
        </div>
        <button id="allOff">EMERGENCY SHUTDOWN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <script>
        // --- ReactBits Hyperspeed ---
        let starSpeed = 2;
        const canvas = document.getElementById('hyperspeed-canvas');
        const renderer = new THREE.WebGLRenderer({canvas, antialias: true, alpha: true});
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for (let i = 0; i < 7000; i++) starCoords.push(Math.random()*600-300, Math.random()*600-300, Math.random()*600-300);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0x00f2ff, size: 0.6}));
        scene.add(stars);

        function animate() {
            requestAnimationFrame(animate);
            stars.position.z += starSpeed;
            if (stars.position.z > 200) stars.position.z = 0;
            renderer.render(scene, camera);
        }
        animate();

        // --- Firebase & UI Logic ---
        const firebaseConfig = {
            apiKey: "AIzaSyB-22CLI_hDwY6--Kg52edkIIHnuZ-1mnk",
            authDomain: "esp32-audio-1e81c.firebaseapp.com",
            databaseURL: "https://esp32-audio-1e81c-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "esp32-audio-1e81c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        document.getElementById("loginBtn").onclick = () => {
            auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value)
                .then(() => {
                    document.getElementById("loginOverlay").style.display = "none";
                    document.getElementById("dashboardContent").style.display = "flex";
                    startLiveSync();
                }).catch(err => { alert(err.message); });
        };

        function startLiveSync() {
            db.ref("temperature").on("value", snap => {
                const val = snap.val();
                document.getElementById("tempVal").innerText = val;
                document.getElementById("tempGauge").style.background = `conic-gradient(var(--neon) ${(val/50)*360}deg, rgba(255,255,255,0.1) 0deg)`;
                // ReactBits: Glow card if too hot
                document.getElementById("tempCard").className = val > 30 ? "card active-neon" : "card";
            });

            db.ref("humidity").on("value", snap => { document.getElementById("humVal").innerText = snap.val(); });

            db.ref("motionStatus").on("value", snap => {
                const active = snap.val();
                const box = document.getElementById("motStatus");
                box.innerText = active ? ">> INTRUSION <<" : "SECURE";
                box.style.color = active ? "#ff4d4f" : "#00f2ff";
                document.getElementById("motCard").style.boxShadow = active ? "0 0 40px #ff4d4f" : "none";
            });

            [1, 2, 3, 4].forEach(i => {
                db.ref("relay" + i).on("value", snap => {
                    const state = snap.val();
                    document.getElementById("btn" + i).className = state ? "btn-device btn-on" : "btn-device";
                    updateWarp();
                });
                document.getElementById("btn" + i).onclick = () => db.ref("relay" + i).transaction(c => !c);
            });
        }

        function updateWarp() {
            db.ref().once('value').then(snap => {
                const d = snap.val();
                starSpeed = (d.relay1 || d.relay2 || d.relay3 || d.relay4) ? 18 : 2;
            });
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('liveTime').innerText = now.toLocaleTimeString();
            document.getElementById('liveDate').innerText = now.toDateString();
        }, 1000);

        renderer.setSize(window.innerWidth, window.innerHeight);
    </script>
</body>
</html>
