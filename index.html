<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hari's Smart Home Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
            --overlay: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: #f4f7f6 no-repeat center center fixed;
            background-size: cover;
            transition: background 1.2s ease-in-out;
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Bar with Blur */
        .top-nav { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px);
            padding: 12px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.1); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }

        .clock-section { text-align: right; }
        #liveTime { font-weight: 800; font-size: 1.3rem; color: var(--primary); margin: 0; line-height: 1; }
        #liveDate { font-size: 0.85rem; color: #555; margin: 2px 0 0 0; }

        /* Responsive Dashboard Grid */
        #dashboard { padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }

        .main-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            margin-top: 10px;
        }

        /* Modern Glass Cards */
        .card { 
            background: var(--overlay); 
            border-radius: 24px; 
            padding: 25px; 
            box-shadow: var(--card-shadow); 
            border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .card-label { color: #888; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; display: block; }

        /* Temperature Gauge */
        .gauge { 
            width: 140px; height: 140px; border-radius: 50%; 
            background: conic-gradient(var(--primary) 0deg, #e2e8f0 0deg); 
            display: flex; align-items: center; justify-content: center; 
            margin: 0 auto; position: relative; 
            transition: background 0.5s ease;
        }
        .gauge::after { content: ""; position: absolute; width: 115px; height: 115px; background: white; border-radius: 50%; }
        .gauge-text { position: relative; z-index: 10; font-size: 1.8rem; font-weight: 900; color: #1a202c; }

        /* Control Buttons */
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .btn-device { 
            border: none; padding: 25px 10px; border-radius: 20px; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; gap: 10px; 
            font-weight: 700; transition: all 0.2s ease; font-size: 0.9rem;
        }
        .btn-on { background: #ebf8ff; color: var(--primary); border: 2px solid var(--primary); box-shadow: 0 4px 12px rgba(0,123,255,0.15); }
        .btn-off { background: #f7fafc; color: #a0aec0; border: 2px solid transparent; }
        .btn-device i { font-size: 1.5rem; }

        /* Motion Badge */
        #motStatus { padding: 15px; border-radius: 15px; font-weight: bold; margin-top: 20px; transition: 0.4s; }
        .motion-alert { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; animation: pulse 1.5s infinite; }
        .motion-safe { background: #f0fff4; color: #2f855a; border: 1px solid #9ae6b4; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        #allOff { 
            width: 100%; max-width: 500px; background: #f56565; color: white; border: none; 
            padding: 18px; border-radius: 18px; font-weight: 800; cursor: pointer; 
            margin: 30px auto; display: block; box-shadow: 0 10px 15px rgba(245,101,101,0.3);
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div>
            <h2 style="margin:0; font-size:1.5rem; letter-spacing:-1px;"><i class="fas fa-bolt" style="color:var(--primary)"></i> IOT DASH</h2>
            <small style="color:#718096; font-weight:600;">HARI'S SMART HOME</small>
        </div>
        <div class="clock-section">
            <p id="liveTime">00:00:00</p>
            <p id="liveDate">Loading...</p>
        </div>
    </nav>

    <div id="dashboard">
        <div class="main-grid">
            <div class="card">
                <span class="card-label">Inside Temperature</span>
                <div class="gauge" id="tempGauge">
                    <span class="gauge-text"><span id="tempVal">--</span>°C</span>
                </div>
            </div>

            <div class="card">
                <span class="card-label">Environment & Security</span>
                <h3 style="font-size: 2rem; margin: 15px 0 25px 0;">
                    <i class="fas fa-tint" style="color:#63b3ed"></i> <span id="humVal">--</span>%
                </h3>
                <div id="motStatus" class="motion-safe">
                    <i class="fas fa-shield-alt"></i> <span id="motText">SCANNING...</span>
                </div>
            </div>

            <div class="card">
                <span class="card-label">Quick Controls</span>
                <div class="control-grid">
                    <button class="btn-device btn-off" id="btn1"><i class="fas fa-lightbulb"></i>Light</button>
                    <button class="btn-device btn-off" id="btn2"><i class="fas fa-fan"></i>Fan</button>
                    <button class="btn-device btn-off" id="btn3"><i class="fas fa-snowflake"></i>AC</button>
                    <button class="btn-device btn-off" id="btn4"><i class="fas fa-plug"></i>Fridge</button>
                </div>
            </div>
        </div>

        <button id="allOff"><i class="fas fa-power-off"></i> EMERGENCY SHUTDOWN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        // --- 1. Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyB-22CLI_hDwY6--Kg52edkIIHnuZ-1mnk",
            authDomain: "esp32-audio-1e81c.firebaseapp.com",
            databaseURL: "https://esp32-audio-1e81c-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "esp32-audio-1e81c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. Live Clock & Date ---
        function updateClock() {
            const now = new Date();
            document.getElementById('liveTime').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
            document.getElementById('liveDate').innerText = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 3. Daily Dynamic Background ---
        function updateBg() {
            const seed = new Date().toDateString(); // Changes only once per day
            document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://picsum.photos/seed/${btoa(seed)}/1920/1080')`;
        }
        updateBg();

        // --- 4. Real-time Firebase Sync ---
        // Sync Temperature
        db.ref("temperature").on("value", (snap) => {
            const val = snap.val();
            if (val !== null) {
                const num = parseFloat(val);
                document.getElementById("tempVal").innerText = num.toFixed(1);
                const deg = (num / 50) * 360; // Assumes 50°C is max for gauge
                document.getElementById("tempGauge").style.background = `conic-gradient(var(--primary) ${deg}deg, #e2e8f0 0deg)`;
            }
        });

        // Sync Humidity
        db.ref("humidity").on("value", (snap) => {
            const val = snap.val();
            if (val !== null) document.getElementById("humVal").innerText = parseFloat(val).toFixed(1);
        });

        // Sync Motion Status
        db.ref("motionStatus").on("value", (snap) => {
            const active = snap.val();
            const badge = document.getElementById("motStatus");
            const text = document.getElementById("motText");
            if (active) {
                badge.className = "motion-alert";
                text.innerText = "MOTION DETECTED!";
            } else {
                badge.className = "motion-safe";
                text.innerText = "AREA SECURE";
            }
        });

        // Sync Relays
        [1, 2, 3, 4].forEach(i => {
            db.ref("relay" + i).on("value", snap => {
                const state = snap.val();
                const btn = document.getElementById("btn" + i);
                btn.className = state ? "btn-device btn-on" : "btn-device btn-off";
            });
            document.getElementById("btn" + i).onclick = () => {
                db.ref("relay" + i).transaction(curr => !curr);
            };
        });

        // Emergency All Off
        document.getElementById("allOff").onclick = () => {
            db.ref().update({ relay1: false, relay2: false, relay3: false, relay4: false });
        };
    </script>
</body>
</html>
