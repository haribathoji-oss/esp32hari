<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hari's Smart Home Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --primary: #007bff; }
        body { font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; background: #000; overflow-x: hidden; }
        #hyperspeed-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #loginOverlay, #dashboardContent { position: relative; z-index: 10; }
        
        /* Login Styling */
        #loginOverlay { position: fixed; inset: 0; background: rgba(240, 242, 245, 0.8); backdrop-filter: blur(10px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 400px; padding: 40px; border-radius: 24px; background: white; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }

        /* Dashboard Styling */
        #dashboardContent { display: none; flex-direction: column; width: 100%; }
        .top-nav { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; padding: 25px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 28px; padding: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.1); color: white; }
        .gauge { width: 140px; height: 140px; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; background: conic-gradient(var(--primary) 0deg, rgba(255,255,255,0.2) 0deg); position: relative; }
        .gauge::after { content: ""; position: absolute; width: 115px; height: 115px; background: #1a202c; border-radius: 50%; }
        .btn-device { border: none; padding: 25px; border-radius: 20px; cursor: pointer; background: rgba(255,255,255,0.05); color: #ccc; }
        .btn-on { background: var(--primary); color: white; box-shadow: 0 0 20px var(--primary); }
        .footer-btns { display: flex; flex-direction: column; gap: 10px; padding: 20px; align-items: center; }
    </style>
</head>
<body>

    <canvas id="hyperspeed-canvas"></canvas>

    <div id="loginOverlay">
        <div class="login-card">
            <h1>Hari's Home</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="loginBtn">Login</button>
            <p id="loginError" style="color:red; display:none;"></p>
        </div>
    </div>

    <div id="dashboardContent">
        <nav class="top-nav">
            <div><h2><i class="fas fa-home"></i> IOT DASH</h2></div>
            <div class="time-group"><p id="liveTime">00:00:00</p></div>
        </nav>
        <div class="main-grid">
            <div class="card">
                <small>INTERNAL TEMP</small>
                <div class="gauge" id="tempGauge"><span class="gauge-text"><span id="tempVal">--</span>°C</span></div>
            </div>
            <div class="card">
                <small>ENVIRONMENT</small>
                <h3><i class="fas fa-tint"></i> <span id="humVal">--</span>%</h3>
                <div id="motStatus">SCANNING...</div>
            </div>
            <div class="card">
                <div class="control-grid">
                    <button class="btn-device" id="btn1"><i class="fas fa-lightbulb"></i>Light</button>
                    <button class="btn-device" id="btn2"><i class="fas fa-fan"></i>Fan</button>
                </div>
            </div>
        </div>
        <div class="footer-btns">
            <button id="allOff">EMERGENCY SHUTDOWN</button>
            <button id="logoutBtn">Logout</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <script>
        // --- 1. Combined 3D Engine (Stars + Ballpit) ---
        const canvas = document.getElementById('hyperspeed-canvas');
        const renderer = new THREE.WebGLRenderer({canvas, antialias: true, alpha: true});
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 10;

        // Stars
        const starGeo = new THREE.BufferGeometry();
        const starCoords = new Float32Array(6000 * 3);
        for (let i = 0; i < 6000 * 3; i++) starCoords[i] = Math.random() * 600 - 300;
        starGeo.setAttribute('position', new THREE.BufferAttribute(starCoords, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0x007bff, size: 0.7}));
        scene.add(stars);

        // Ballpit
        const ballpit = new THREE.InstancedMesh(new THREE.SphereGeometry(0.5, 32, 32), new THREE.MeshPhongMaterial({ color: 0x007bff }), 20);
        const matrix = new THREE.Matrix4();
        const balls = Array.from({length: 20}, () => ({ pos: new THREE.Vector3(Math.random()*10-5, Math.random()*10-5, 0), vel: new THREE.Vector3(Math.random()*0.1-0.05, Math.random()*0.1-0.05, 0) }));
        scene.add(ballpit);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        let starSpeed = 2;
        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.001;
            stars.position.z += starSpeed;
            if (stars.position.z > 200) stars.position.z = 0;

            balls.forEach((b, i) => {
                b.pos.add(b.vel);
                if(Math.abs(b.pos.x) > 8) b.vel.x *= -1;
                if(Math.abs(b.pos.y) > 8) b.vel.y *= -1;
                matrix.setPosition(b.pos);
                ballpit.setMatrixAt(i, matrix);
            });
            ballpit.instanceMatrix.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. Firebase & UI Logic ---
        const firebaseConfig = { apiKey: "AIzaSyB-22CLI_hDwY6--Kg52edkIIHnuZ-1mnk", authDomain: "esp32-audio-1e81c.firebaseapp.com", databaseURL: "https://esp32-audio-1e81c-default-rtdb.europe-west1.firebasedatabase.app", projectId: "esp32-audio-1e81c" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        document.getElementById("loginBtn").onclick = () => {
            auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value)
            .then(() => {
                document.getElementById("loginOverlay").style.display = "none";
                document.getElementById("dashboardContent").style.display = "flex";
                startSync();
            });
        };

        function startSync() {
            db.ref("temperature").on("value", s => document.getElementById("tempVal").innerText = parseFloat(s.val()).toFixed(1));
            [1, 2].forEach(i => {
                db.ref("relay"+i).on("value", s => document.getElementById("btn"+i).className = s.val() ? "btn-device btn-on" : "btn-device");
                document.getElementById("btn"+i).onclick = () => db.ref("relay"+i).transaction(c => !c);
            });
        }
        
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        renderer.setSize(window.innerWidth, window.innerHeight);
    </script>
</body>
</html>
