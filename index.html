<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hari's Smart Home Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
            --bg: #f4f7f6;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }

        /* Login Screen - Center responsive */
        #loginOverlay { position: fixed; inset: 0; background: #fff; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 400px; padding: 40px; border-radius: 20px; box-shadow: var(--card-shadow); text-align: center; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Navbar */
        .top-nav { background: #fff; padding: 15px 25px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }

        /* Dashboard Container */
        #dashboard { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }

        /* Responsive Grid System */
        .main-grid { 
            display: grid; 
            grid-template-columns: 1fr; /* Single column for mobile */
            gap: 20px; 
            margin-top: 20px;
        }

        @media (min-width: 768px) {
            .main-grid { grid-template-columns: repeat(2, 1fr); } /* 2 columns for tablets */
        }

        @media (min-width: 1024px) {
            .main-grid { grid-template-columns: repeat(3, 1fr); } /* 3 columns for laptops */
        }

        /* Metric Cards */
        .card { background: white; border-radius: 18px; padding: 20px; box-shadow: var(--card-shadow); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card-header { color: #888; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        
        /* Temperature Gauge */
        .gauge { width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(var(--primary) 0deg, #edf2f7 0deg); display: flex; align-items: center; justify-content: center; margin: 0 auto; position: relative; }
        .gauge::after { content: ""; position: absolute; width: 100px; height: 100px; background: white; border-radius: 50%; }
        .gauge-text { position: relative; z-index: 10; font-size: 1.5rem; font-weight: bold; }

        /* Appliance Buttons */
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-device { border: none; padding: 20px 10px; border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; font-weight: 600; transition: 0.2s; }
        .btn-on { background: #e7f3ff; color: var(--primary); border: 2px solid var(--primary); }
        .btn-off { background: #f8f9fa; color: #adb5bd; border: 2px solid transparent; }
        .btn-device i { font-size: 1.4rem; }

        /* Motion Notification */
        .motion-box { padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }
        .detected { background: #fff5f5; color: #e53e3e; border: 1px solid #feb2b2; animation: blink 1s infinite; }
        .clear { background: #f0fff4; color: #38a169; border: 1px solid #c6f6d5; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Footer Buttons */
        .actions { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
        #allOff { background: #ff4d4f; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-card">
            <h2 style="margin-bottom: 30px;">Hari's Home Cloud</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="loginBtn">Sign In</button>
        </div>
    </div>

    <nav class="top-nav" id="navbar">
        <div style="font-weight: 800; font-size: 1.2rem;"><i class="fas fa-microchip"></i> IOT DASH</div>
        <button onclick="location.reload()" style="background:none; border:none; color:#888;"><i class="fas fa-sign-out-alt"></i></button>
    </nav>

    <div id="dashboard">
        <h2 style="margin-bottom: 5px;">Dashboard Overview</h2>
        <p style="color: #888; margin-top: 0; font-size: 0.9rem;">Live system status from ESP32</p>

        <div class="main-grid">
            <div class="card">
                <div class="card-header">Internal Temp</div>
                <div class="gauge" id="tempGauge">
                    <span class="gauge-text"><span id="tempVal">--</span>°C</span>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Environment & Security</div>
                <div style="font-size: 1.2rem; margin-bottom: 20px;">Humidity: <b id="humVal">--</b>%</div>
                <div id="motStatus" class="motion-box clear">
                    <i class="fas fa-shield-alt"></i> <span id="motText">SECURE</span>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Quick Actions</div>
                <div class="control-grid">
                    <button class="btn-device btn-off" id="btn1"><i class="fas fa-lightbulb"></i>Light</button>
                    <button class="btn-device btn-off" id="btn2"><i class="fas fa-fan"></i>Fan</button>
                    <button class="btn-device btn-off" id="btn3"><i class="fas fa-snowflake"></i>AC</button>
                    <button class="btn-device btn-off" id="btn4"><i class="fas fa-plug"></i>Fridge</button>
                </div>
            </div>
        </div>

        <div class="actions">
            <button id="allOff"><i class="fas fa-power-off"></i> SWITCH ALL APPLIANCES OFF</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB-22CLI_hDwY6--Kg52edkIIHnuZ-1mnk",
            authDomain: "esp32-audio-1e81c.firebaseapp.com",
            databaseURL: "https://esp32-audio-1e81c-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "esp32-audio-1e81c"
        };
        firebase.initializeApp(firebaseConfig);

        document.getElementById("loginBtn").onclick = () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            firebase.auth().signInWithEmailAndPassword(email, pass).then(() => {
                document.getElementById("loginOverlay").style.display = "none";
                document.getElementById("navbar").style.display = "flex";
                document.getElementById("dashboard").style.display = "block";
                runDashboard();
            }).catch(err => alert(err.message));
        };

        function runDashboard() {
            const db = firebase.database();

            // Temp Gauge Logic
            db.ref("temperature").on("value", snap => {
                const val = snap.val() || 0;
                document.getElementById("tempVal").innerText = val.toFixed(1);
                const percentage = (val / 50) * 360; 
                document.getElementById("tempGauge").style.background = `conic-gradient(var(--primary) ${percentage}deg, #edf2f7 0deg)`;
            });

            db.ref("humidity").on("value", snap => {
                document.getElementById("humVal").innerText = snap.val()?.toFixed(1) || "--";
            });

            // Appliances Sync
            [1, 2, 3, 4].forEach(i => {
                db.ref("relay" + i).on("value", snap => {
                    const status = snap.val();
                    const b = document.getElementById("btn" + i);
                    b.className = status ? "btn-device btn-on" : "btn-device btn-off";
                });
                document.getElementById("btn" + i).onclick = () => db.ref("relay" + i).transaction(c => !c);
            });

            // Motion Logic
            db.ref("motionStatus").on("value", snap => {
                const active = snap.val();
                const box = document.getElementById("motStatus");
                const txt = document.getElementById("motText");
                box.className = active ? "motion-box detected" : "motion-box clear";
                txt.innerText = active ? "MOTION DETECTED!" : "AREA SECURE";
            });

            document.getElementById("allOff").onclick = () => [1,2,3,4].forEach(i => db.ref("relay"+i).set(false));
        }
    </script>
</body>
</html>
