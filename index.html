<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hari's Smart Home Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --primary: #007bff; --neon: #00f2ff; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #000; color: white; overflow-x: hidden; }

        #hyperspeed-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #loginOverlay, #dashboardContent { position: relative; z-index: 10; }
        
        #loginOverlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card { width: 90%; max-width: 350px; background: #111; padding: 40px; border-radius: 24px; border: 1px solid #333; text-align: center; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }

        #dashboardContent { display: none; flex-direction: column; width: 100%; }
        .top-nav { background: rgba(0,0,0,0.6); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 30px; text-align: center; }
        .active-device { border: 1px solid var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        .gauge { width: 140px; height: 140px; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; background: conic-gradient(var(--primary) 0deg, rgba(255,255,255,0.1) 0deg); position: relative; }
        .gauge::after { content: ""; position: absolute; width: 115px; height: 115px; background: #000; border-radius: 50%; }
        
        .btn-device { border: none; padding: 20px; border-radius: 20px; cursor: pointer; background: rgba(255,255,255,0.05); color: #888; font-weight: 700; transition: 0.3s; }
        .btn-on { background: var(--primary); color: white; box-shadow: 0 0 20px var(--primary); }
        #allOff { background: #ff4d4f; color: white; border: none; padding: 18px; border-radius: 15px; width: 90%; max-width: 400px; cursor: pointer; margin: 20px auto; display: block; }
    </style>
</head>
<body>

    <canvas id="hyperspeed-canvas"></canvas>

    <div id="loginOverlay">
        <div class="login-card">
            <h2>Hari's Home Pro</h2>
            <input type="email" id="email" placeholder="haribathoji@gmail.com">
            <input type="password" id="password" placeholder="Password">
            <button id="loginBtn">ACCESS SYSTEM</button>
            <p id="loginError" style="color:red; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <div id="dashboardContent">
        <nav class="top-nav">
            <div><h2><i class="fas fa-microchip"></i> HARI_OS</h2></div>
            <div style="text-align:right;">
                <p id="liveTime" style="margin:0; font-weight:bold;"></p>
                <p id="liveDate" style="margin:0; font-size:0.8rem; opacity:0.5;"></p>
            </div>
        </nav>

        <div class="main-grid">
            <div class="card" id="tempCard">
                <small style="opacity:0.5;">INTERNAL TEMP</small>
                <div class="gauge" id="tempGauge"><span id="tempVal" style="position:relative; z-index:10; font-size:1.8rem;">--</span>°C</div>
            </div>
            <div class="card" id="motCard">
                <small style="opacity:0.5;">ENVIRONMENT</small>
                <h3 style="margin:25px 0; font-size: 2rem;"><i class="fas fa-tint" style="color:var(--neon)"></i> <span id="humVal">--</span>%</h3>
                <div id="motStatus">SCANNING...</div>
            </div>
            <div class="card">
                <small style="opacity:0.5;">QUICK CONTROLS</small>
                <div class="control-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;">
                    <button class="btn-device" id="btn1"><i class="fas fa-lightbulb"></i><br>Light</button>
                    <button class="btn-device" id="btn2"><i class="fas fa-fan"></i><br>Fan</button>
                    <button class="btn-device" id="btn3"><i class="fas fa-snowflake"></i><br>AC</button>
                    <button class="btn-device" id="btn4"><i class="fas fa-plug"></i><br>Fridge</button>
                </div>
            </div>
        </div>
        <button id="allOff">EMERGENCY SHUTDOWN</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <script>
        // Hyperspeed Background
        let starSpeed = 2;
        const canvas = document.getElementById('hyperspeed-canvas');
        const renderer = new THREE.WebGLRenderer({canvas, antialias: true, alpha: true});
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        const stars = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(Array.from({length:6000},()=>Math.random()*600-300), 3)), new THREE.PointsMaterial({color: 0x00f2ff, size: 0.6}));
        scene.add(stars);
        function animate() { requestAnimationFrame(animate); stars.position.z += starSpeed; if(stars.position.z > 200) stars.position.z = 0; renderer.render(scene, camera); }
        animate();

        // App Logic
        const firebaseConfig = { apiKey: "AIzaSyB-22CLI_hDwY6--Kg52edkIIHnuZ-1mnk", authDomain: "esp32-audio-1e81c.firebaseapp.com", databaseURL: "https://esp32-audio-1e81c-default-rtdb.europe-west1.firebasedatabase.app", projectId: "esp32-audio-1e81c" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        document.getElementById("loginBtn").onclick = () => {
            firebase.auth().signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value)
            .then(() => { document.getElementById("loginOverlay").style.display = "none"; document.getElementById("dashboardContent").style.display = "flex"; startSync(); })
            .catch(err => { document.getElementById("loginError").innerText = err.message; document.getElementById("loginError").style.display = "block"; });
        };

        function startSync() {
            db.ref("temperature").on("value", s => { const v = s.val(); document.getElementById("tempVal").innerText = v; document.getElementById("tempCard").className = v > 30 ? "card active-device" : "card"; });
            db.ref("humidity").on("value", s => document.getElementById("humVal").innerText = s.val());
            db.ref("motionStatus").on("value", s => { const a = s.val(); document.getElementById("motStatus").innerText = a ? ">> INTRUSION <<" : "SECURE"; document.getElementById("motCard").style.boxShadow = a ? "0 0 20px red" : "none"; });
            [1,2,3,4].forEach(i => {
                db.ref("relay"+i).on("value", s => { document.getElementById("btn"+i).className = s.val() ? "btn-device btn-on" : "btn-device"; updateSpeed(); });
                document.getElementById("btn"+i).onclick = () => db.ref("relay"+i).transaction(c => !c);
            });
        }

        function updateSpeed() {
            db.ref().once('value').then(s => { const d = s.val(); starSpeed = (d.relay1 || d.relay2 || d.relay3 || d.relay4) ? 18 : 2; });
        }

        document.getElementById("allOff").onclick = () => db.ref().update({relay1:false, relay2:false, relay3:false, relay4:false});
        setInterval(() => { const n = new Date(); document.getElementById('liveTime').innerText = n.toLocaleTimeString(); document.getElementById('liveDate').innerText = n.toDateString(); }, 1000);
    </script>
</body>
</html>
